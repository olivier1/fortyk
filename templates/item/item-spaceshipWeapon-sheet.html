<section class="{{cssClass}} item-sheet flexcol">
    <header class="sheet-header">
        <img class="profile-img" src="{{img}}" data-action="editImage" data-field="img" alt="Portrait">

    </header>
    {{#if isGM}}
    <label class="button clone">Copy Item</label>
    {{/if}}
    <div class="flexcol">
            <label>Name:</label>
            <input type="text" class="weapon-mod" value="{{name}}" data-target="name" data-dtype="String">
        </div>
    <div class="flexcol">
        <label>Power:</label>
        <input type="text" class="weapon-mod" value="{{system.power.value}}" data-target="system.power.value">
    </div>
    <div class="flexcol">
        <label>Space:</label>
        <input type="text" class="weapon-mod" value="{{system.space.value}}" data-target="system.space.value">
    </div>
    <div class="flexcol">
        <label>Ship Points:</label>
        <input type="text" class="weapon-mod" value="{{system.sp.value}}" data-target="system.sp.value">
    </div>
    <div class="flexcol">
        <label>Type:</label>
        <select class="damage-type" name="system.type.value">
             
            {{selectOptions FORTYK.spaceshipWeaponTypes selected=system.type.value valueAttr="value" labelAttr="value"}}
            
        </select>
    </div>
    <div class="flexcol">
        <label>Damage:</label>
        <input type="text" class="weapon-mod" value="{{system.damage.value}}" data-target="system.damage.value">
    </div>
    <div class="flexcol">
        <label>Range:</label>
         <select class="damage-type" name="system.range.value">
             
            {{selectOptions FORTYK.spaceshipWeaponRanges selected=system.range.value valueAttr="value" labelAttr="value"}}
            
        </select>
    </div>
    <div class="flexcol">
        <label>Strength:</label>
        <input type="text" class="weapon-mod" value="{{system.strength.value}}" data-target="system.strength.value">
    </div>
    <div class="flexcol">
        <label>Location:</label>
        <select class="damage-type" name="system.location.value">
            {{selectOptions FORTYK.spaceshipWeaponLocations selected=system.location.value valueAttr="value" labelAttr="label"}}
           
        </select>
    </div>

    {{#if isGM}}
    <div class="item-description">
        <label>GM Description:</label>
        {{#if editable}}
        <prose-mirror
                      name="system.description.gm"
                      button="true"
                      editable="{{editable}}"
                      toggled="false"
                      value="{{system.description.gm}}">
            {{{enrichedGMDescription}}}
        </prose-mirror>
        {{else}}
        {{{enrichedGMDescription}}}
        {{/if}}
    </div>
    {{/if}}
    <div class="item-description">
        <label>Description:</label>
        {{#if editable}}
        <prose-mirror
                      name="system.description.value"
                      button="true"
                      editable="{{editable}}"
                      toggled="false"
                      value="{{system.description.value}}">
            {{{enrichedDescription}}}
        </prose-mirror>
        {{else}}
        {{{enrichedDescription}}}
        {{/if}}
    </div>
</section>
